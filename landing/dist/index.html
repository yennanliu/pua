<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/pua-logo.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pua — Claude Code Skill</title>
    <meta name="description" content="用大厂 PUA 话术驱动 Claude Code 穷尽所有方案才允许放弃。基于 9 个真实场景 × 18 组对照实验验证。" />
    <meta property="og:title" content="pua — Claude Code Skill" />
    <meta property="og:description" content="Forces Claude Code into exhaustive debugging before giving up. 4-level pressure escalation, 7-item mandatory checklist, 5-step methodology." />
    <meta property="og:type" content="website" />
    <script type="module" crossorigin src="/assets/index--C3jDJ_g.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-c-M_Xwwt.css">
    <style>
      .pua-roadmap{max-width:520px;margin:.75rem auto 0;position:relative;overflow:hidden;max-height:180px}
      .pua-roadmap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(transparent,var(--bg,#09090b));pointer-events:none}
      .pua-rm-item{display:flex;gap:.5rem;padding:.25rem 0;align-items:flex-start}
      .pua-rm-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted,#71717a);margin-top:5px;flex-shrink:0;opacity:.35}
      .pua-rm-dot.now{background:var(--accent,#adfa1b);opacity:1;width:10px;height:10px;margin-top:4px}
      .pua-rm-v{font-size:.7rem;font-weight:700;color:var(--text-muted,#71717a);width:2.2rem;flex-shrink:0}
      .pua-rm-item.now .pua-rm-v{color:var(--accent,#adfa1b)}
      .pua-rm-d{font-size:.65rem;color:var(--text-muted,#71717a);line-height:1.4}
      .pua-rm-item.now .pua-rm-d{color:var(--text-secondary,#a1a1aa)}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "4dfa805499264080a512b9999de3a5b6"}'></script>
    <script>
      var _ro = new MutationObserver(function() {
        var badge = document.querySelector('.hero-badge');
        if (!badge) return;
        _ro.disconnect();

        // Detect language from React's lang switcher or html lang
        var lang = 'zh';
        try {
          var sel = document.querySelector('[class*="lang"] [class*="active"]');
          if (sel) {
            var t = sel.textContent.toLowerCase();
            if (t.indexOf('en') >= 0) lang = 'en';
            else if (t.indexOf('ja') >= 0 || t.indexOf('日') >= 0) lang = 'ja';
          }
        } catch(e) {}

        var data = {
          zh: [
            {v:'v2.7',d:'强关联 · 能动性对照表 · L1-L4 旁白恢复',now:true},
            {v:'v2.6',d:'SB Leader 夸夸模式 · ENFP × 14 味道',now:true},
            {v:'v2.5',d:'隐私同意 · 行为强制 · Unicode 表格',now:false},
            {v:'v2.4',d:'反馈收集 · 脱敏上传 · /pua survey',now:false},
            {v:'v2.3',d:'8 Skill 拆分 · Sub-agent · Always-On',now:false},
            {v:'v2.0',d:'渐进式加载 (-62%) · 三条红线 · Hooks',now:false},
            {v:'v1.x',d:'铁律 · L1-L4 · 7 项清单 · 13 味道',now:false}
          ],
          en: [
            {v:'v2.7',d:'Force-link display · Proactivity table · L1-L4 asides restored',now:true},
            {v:'v2.6',d:'SB Leader hype mode · ENFP × 14 flavors',now:true},
            {v:'v2.5',d:'Privacy consent · Forced behavior · Unicode tables',now:false},
            {v:'v2.4',d:'Stop hook feedback · Sanitize upload · /pua survey',now:false},
            {v:'v2.3',d:'8 modular skills · Sub-agent inject · Always-On',now:false},
            {v:'v2.0',d:'Progressive disclosure (-62%) · Red lines · Hooks',now:false},
            {v:'v1.x',d:'Iron rules · L1-L4 · 7-point checklist · 13 flavors',now:false}
          ],
          ja: [
            {v:'v2.7',d:'強制連携 · 能動性表 · L1-L4 旁白復元',now:true},
            {v:'v2.6',d:'SB Leader 夸夸モード · ENFP × 14フレーバー',now:true},
            {v:'v2.5',d:'プライバシー同意 · 行動強制 · Unicode表',now:false},
            {v:'v2.4',d:'フィードバック · 脱敏アップロード · /pua survey',now:false},
            {v:'v2.3',d:'8スキル分割 · Sub-agent · Always-On',now:false},
            {v:'v2.0',d:'段階的開示 (-62%) · 三本の赤線 · Hooks',now:false},
            {v:'v1.x',d:'鉄則 · L1-L4 · 7項目チェック · 13フレーバー',now:false}
          ]
        };

        var items = data[lang] || data.zh;
        var rm = document.createElement('div');
        rm.className = 'pua-roadmap';

        items.forEach(function(it) {
          var row = document.createElement('div');
          row.className = 'pua-rm-item' + (it.now ? ' now' : '');

          var dot = document.createElement('div');
          dot.className = 'pua-rm-dot' + (it.now ? ' now' : '');
          row.appendChild(dot);

          var ver = document.createElement('div');
          ver.className = 'pua-rm-v';
          ver.textContent = it.v;
          row.appendChild(ver);

          var desc = document.createElement('div');
          desc.className = 'pua-rm-d';
          desc.textContent = it.d;
          row.appendChild(desc);

          rm.appendChild(row);
        });

        var guideLink = document.createElement('a');
        guideLink.href = '/guide.html';
        guideLink.textContent = lang === 'en' ? '📖 Beginner Guide' : lang === 'ja' ? '📖 初心者ガイド' : '📖 新手教程';
        guideLink.style.cssText = 'display:inline-block;margin-bottom:.75rem;font-size:.7rem;color:var(--accent,#adfa1b);text-decoration:none;border:1px solid var(--accent,#adfa1b);padding:3px 10px;border-radius:100px;opacity:.8';
        rm.insertBefore(guideLink, rm.firstChild);

        badge.parentNode.replaceChild(rm, badge);

        // Re-detect language on lang switch clicks
        document.addEventListener('click', function(e) {
          var btn = e.target.closest('[class*="lang"]');
          if (!btn) return;
          setTimeout(function() {
            var newLang = 'zh';
            var active = document.querySelector('[class*="lang"] [class*="active"]');
            if (active) {
              var txt = active.textContent.toLowerCase();
              if (txt.indexOf('en') >= 0) newLang = 'en';
              else if (txt.indexOf('ja') >= 0 || txt.indexOf('日') >= 0) newLang = 'ja';
            }
            var newItems = data[newLang] || data.zh;
            var existing = document.querySelector('.pua-roadmap');
            if (!existing) return;
            var children = existing.querySelectorAll('.pua-rm-d');
            children.forEach(function(child, i) {
              if (newItems[i]) child.textContent = newItems[i].d;
            });
          }, 100);
        });
      });
      _ro.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
